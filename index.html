<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseNews — Live Headlines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #181c27;
      --card:    #1e2335;
      --border:  #2a2f45;
      --accent:  #5b8dee;
      --accent2: #a78bfa;
      --text:    #e8eaf0;
      --muted:   #8891aa;
      --danger:  #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; opacity: 0.35;
    }

    .wrapper { position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px;
      background: rgba(15,17,23,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      gap: 16px; flex-wrap: wrap;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 900;
      color: var(--text); letter-spacing: -0.5px; white-space: nowrap;
    }
    .logo span { color: var(--accent); }

    .live-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(248,113,113,0.12); border: 1px solid var(--danger);
      color: var(--danger); font-size: 0.7rem; font-weight: 600;
      letter-spacing: 1px; padding: 3px 10px; border-radius: 20px;
      text-transform: uppercase;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--danger); animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .search-bar {
      display: flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; flex: 1; max-width: 360px;
    }
    .search-bar input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.88rem; padding: 9px 14px;
    }
    .search-bar input::placeholder { color: var(--muted); }
    .search-bar button {
      background: var(--accent); border: none; color: #fff;
      padding: 9px 14px; cursor: pointer; font-size: 0.85rem;
      transition: background 0.2s;
    }
    .search-bar button:hover { background: #3a6fd8; }

    /* ── Tabs ── */
    .tabs-wrap {
      background: rgba(15,17,23,0.7); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border); padding: 0 32px;
      overflow-x: auto; position: sticky; top: 65px; z-index: 99;
    }
    .tabs { display: flex; min-width: max-content; }
    .tab {
      padding: 14px 20px; font-size: 0.82rem; font-weight: 600;
      color: var(--muted); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Hero ── */
    .hero { padding: 40px 32px 24px; max-width: 1200px; margin: 0 auto; }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 900;
      line-height: 1.15; margin-bottom: 8px;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p { color: var(--muted); font-size: 0.95rem; }

    /* ── Grid ── */
    .grid-section { max-width: 1200px; margin: 0 auto; padding: 0 32px 60px; }
    .section-label {
      font-size: 0.72rem; font-weight: 600; color: var(--accent);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
      cursor: pointer; text-decoration: none;
      display: flex; flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
      border-color: var(--accent);
    }
    .card-img {
      width: 100%; height: 180px; object-fit: cover;
      background: var(--surface); display: block;
    }
    .card-img-placeholder {
      width: 100%; height: 180px;
      background: linear-gradient(135deg, #1a2038, #252d4a);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .card-source { font-size: 0.7rem; font-weight: 600; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.8px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; line-height: 1.4; color: var(--text); }
    .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; flex: 1; }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 10px; border-top: 1px solid var(--border); margin-top: 4px;
    }
    .card-time { font-size: 0.7rem; color: var(--muted); }
    .card-link { font-size: 0.75rem; font-weight: 600; color: var(--accent); text-decoration: none; }
    .card-link:hover { text-decoration: underline; }

    /* ── States ── */
    .state-box {
      grid-column: 1/-1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px; gap: 16px; color: var(--muted);
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box {
      grid-column: 1/-1; background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25); border-radius: 10px;
      padding: 28px; text-align: center; color: var(--danger);
    }
    .error-box h3 { margin-bottom: 8px; }
    .error-box p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
    .error-box code {
      background: rgba(255,255,255,0.06); padding: 2px 7px;
      border-radius: 4px; font-size: 0.82rem; color: var(--accent2);
    }

    footer {
      text-align: center; padding: 28px; color: var(--muted);
      font-size: 0.78rem; border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      .hero, .grid-section { padding-left: 16px; padding-right: 16px; }
      .tabs-wrap { padding: 0 16px; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="wrapper">

  <header>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="logo">Pulse<span>News</span></div>
      <div class="live-badge"><span class="live-dot"></span>Live</div>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search headlines…" />
      <button onclick="doSearch()">🔍</button>
    </div>
  </header>

  <div class="tabs-wrap">
    <div class="tabs" id="tabs">
      <div class="tab active" data-cat="general">Top Stories</div>
      <div class="tab" data-cat="technology">Technology</div>
      <div class="tab" data-cat="business">Business</div>
      <div class="tab" data-cat="science">Science</div>
      <div class="tab" data-cat="health">Health</div>
      <div class="tab" data-cat="sports">Sports</div>
      <div class="tab" data-cat="entertainment">Entertainment</div>
    </div>
  </div>

  <div class="hero">
    <h1>Stay ahead of<br/><em>every story.</em></h1>
    <p id="hero-sub">Loading today's headlines…</p>
  </div>

  <div class="grid-section">
    <div class="section-label" id="grid-label">Top Stories</div>
    <div class="news-grid" id="news-grid">
      <div class="state-box"><div class="spinner"></div><span>Fetching headlines…</span></div>
    </div>
  </div>

  <footer>PulseNews © 2025 &nbsp;·&nbsp; Powered by NewsAPI + Python/Flask</footer>
</div>

<script>
  // ── All API calls go to our OWN Python backend (/api/news, /api/search)
  // The frontend never touches the API key directly — Python handles it.

  let currentCat = 'general';

  // ── Canvas background ─────────────────────────────────────────────────────
  (function() {
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, orbs;

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

    function makeOrbs(n) {
      return Array.from({length: n}, () => ({
        x: Math.random()*W, y: Math.random()*H,
        r: 60 + Math.random()*140,
        dx: (Math.random()-0.5)*0.35, dy: (Math.random()-0.5)*0.35,
        hue: Math.random()<0.5 ? 220 : 260,
        a: 0.08 + Math.random()*0.12
      }));
    }

    function draw() {
      ctx.clearRect(0,0,W,H);
      orbs.forEach(o => {
        const g = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
        g.addColorStop(0, `hsla(${o.hue},70%,60%,${o.a})`);
        g.addColorStop(1, `hsla(${o.hue},70%,50%,0)`);
        ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
        o.x += o.dx; o.y += o.dy;
        if (o.x < -o.r) o.x = W+o.r; if (o.x > W+o.r) o.x = -o.r;
        if (o.y < -o.r) o.y = H+o.r; if (o.y > H+o.r) o.y = -o.r;
      });
      requestAnimationFrame(draw);
    }
    resize(); orbs = makeOrbs(10);
    window.addEventListener('resize', () => { resize(); orbs = makeOrbs(10); });
    draw();
  })();

  // ── Tabs ──────────────────────────────────────────────────────────────────
  document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    document.getElementById('search-input').value = '';
    document.getElementById('grid-label').textContent = tab.textContent;
    loadByCategory(currentCat);
  });

  // ── Search ────────────────────────────────────────────────────────────────
  function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    document.getElementById('grid-label').textContent = `Results for "${q}"`;
    loadBySearch(q);
  }
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  // ── API calls to Python backend ───────────────────────────────────────────
  async function loadByCategory(cat) {
    showLoading();
    try {
      // Calls our Python Flask route: /api/news?category=technology
      const res  = await fetch(`/api/news?category=${cat}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderCards(data.articles || [], cat);
      document.getElementById('hero-sub').textContent =
        `${data.totalResults} stories · Updated ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      showError(err.message);
    }
  }

  async function loadBySearch(q) {
    showLoading();
    try {
      // Calls our Python Flask route: /api/search?q=bitcoin
      const res  = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderCards(data.articles || [], 'general');
      document.getElementById('hero-sub').textContent =
        `${data.totalResults} results for "${q}"`;
    } catch (err) {
      showError(err.message);
    }
  }

  // ── Render cards ──────────────────────────────────────────────────────────
  function renderCards(articles, cat) {
    const ICONS = {technology:'💻',business:'📈',science:'🔬',health:'🏥',sports:'⚽',entertainment:'🎬',general:'📰'};
    const icon  = ICONS[cat] || '📰';

    if (!articles.length) { showEmpty(); return; }

    document.getElementById('news-grid').innerHTML = articles.map(a => {
      const time = a.publishedAt
        ? new Date(a.publishedAt).toLocaleDateString('en-IN', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})
        : '';
      const desc = (a.description || '').slice(0,120) + ((a.description||'').length > 120 ? '…' : '');

      return `
        <a class="card" href="${a.url}" target="_blank" rel="noopener noreferrer">
          ${a.urlToImage
            ? `<img class="card-img" src="${a.urlToImage}" alt="" loading="lazy"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
               <div class="card-img-placeholder" style="display:none">${icon}</div>`
            : `<div class="card-img-placeholder">${icon}</div>`
          }
          <div class="card-body">
            <div class="card-source">${escHtml(a.source)}</div>
            <div class="card-title">${escHtml(a.title)}</div>
            ${desc ? `<div class="card-desc">${escHtml(desc)}</div>` : ''}
            <div class="card-footer">
              <span class="card-time">${time}</span>
              <span class="card-link">Read more →</span>
            </div>
          </div>
        </a>`;
    }).join('');
  }

  // ── UI states ─────────────────────────────────────────────────────────────
  function showLoading() {
    document.getElementById('news-grid').innerHTML =
      `<div class="state-box"><div class="spinner"></div><span>Fetching headlines…</span></div>`;
  }
  function showEmpty() {
    document.getElementById('news-grid').innerHTML =
      `<div class="state-box">📭 <span>No stories found.</span></div>`;
  }
  function showError(msg) {
    document.getElementById('news-grid').innerHTML =
      `<div class="error-box"><h3>⚠ Could not load news</h3><p>${escHtml(msg)}</p></div>`;
  }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadByCategory('general');
</script>
</body>
</html>
